<style>
        body {
            background-color: #0b1514;
            color: #dae5e3;
            font-family: 'Hanken Grotesk', sans-serif;
            overflow: hidden;
        }

        .gradient-mesh {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 20%, #103632 0%, #0b1514 100%);
            z-index: -1;
        }

        .glow-pulse {
            animation: pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }

        .floating {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        .shimmer-btn {
            position: relative;
            overflow: hidden;
        }

        .shimmer-btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                to bottom right,
                rgba(255, 255, 255, 0) 0%,
                rgba(255, 255, 255, 0.1) 50%,
                rgba(255, 255, 255, 0) 100%
            );
            transform: rotate(45deg);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-150%) rotate(45deg); }
            100% { transform: translateX(150%) rotate(45deg); }
        }
    </style>
</head>
<body class="flex flex-col min-h-screen items-center justify-between py-16 px-margin-mobile relative">

            Get Started

<!-- Micro-interactions Script -->
<script>
        document.getElementById('get-started').addEventListener('click', function() {
            // Haptic feedback simulation and visual feedback
            this.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span>';
            setTimeout(() => {
                this.classList.add('scale-[20]', 'opacity-0');
                this.parentElement.parentElement.style.opacity = '0';
                this.parentElement.parentElement.style.transition = 'all 0.8s ease-in-out';
            }, 300);
        });

        // Parallax effect for the hero image
        window.addEventListener('mousemove', (e) => {
            const hero = document.querySelector('.floating');
            const moveX = (e.clientX - window.innerWidth / 2) / 50;
            const moveY = (e.clientY - window.innerHeight / 2) / 50;
            hero.style.transform = `translate(${moveX}px, ${moveY}px)`;
        });
    </script>
<!-- Material Symbols Injection -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
