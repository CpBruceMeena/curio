<!-- Micro-interaction Script -->
<script>
    const card = document.querySelector('.knowledge-card');
    let startY = 0;

    card.addEventListener('touchstart', (e) => {
        startY = e.touches[0].clientY;
    });

    card.addEventListener('touchmove', (e) => {
        const currentY = e.touches[0].clientY;
        const diff = startY - currentY;
        if (Math.abs(diff) < 100) {
            card.style.transform = `translateY(${-diff * 0.2}px) scale(${1 - Math.abs(diff) * 0.0002})`;
        }
    });

    card.addEventListener('touchend', () => {
        card.style.transform = 'translateY(0) scale(1)';
    });

    // Toggle Like State
    const likeBtn = document.querySelector('.group:first-child .material-symbols-outlined');
    let liked = true;
    document.querySelector('.group:first-child').addEventListener('click', () => {
        liked = !liked;
        likeBtn.style.fontVariationSettings = liked ? "'FILL' 1" : "'FILL' 0";
        likeBtn.classList.toggle('text-primary', liked);
        likeBtn.classList.toggle('text-white', !liked);
    });
</script>
